name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing GitHub release tag to rebuild standalone assets for"
        required: true
        default: "v0.4.0"

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: [release-please, standalone]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dcc-mcp-unity
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install build twine && python -m build && python -m twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1

  standalone:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'main' || needs.release-please.outputs.tag_name }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install PyOxidizer
        run: python -m pip install pyoxidizer==0.24.0
      - name: Build standalone sidecar
        run: python tools/build_binary.py
      - name: Archive standalone (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="dcc-mcp-unity-${{ needs.release-please.outputs.tag_name || inputs.tag_name }}-${RUNNER_OS,,}-${RUNNER_ARCH}.tar.gz"
          tar -czf "$archive" -C dist/standalone .
          echo "ASSET=$archive" >> "$GITHUB_ENV"
      - name: Archive standalone (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "dcc-mcp-unity-${{ needs.release-please.outputs.tag_name || inputs.tag_name }}-windows-${env:RUNNER_ARCH}.zip"
          Compress-Archive -Path dist/standalone/* -DestinationPath $archive
          "ASSET=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Upload standalone release asset (Unix)
        if: runner.os != 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name || inputs.tag_name }}" "$ASSET" --clobber
      - name: Upload standalone release asset (Windows)
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name || inputs.tag_name }}" "$env:ASSET" --clobber
