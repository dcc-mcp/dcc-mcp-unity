name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "release-please--branches--**"]
  schedule:
    - cron: "29 3 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unity-editmode:
    name: Unity ${{ matrix.label }} / EditMode
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      # A Personal license is one seat, so Editor activations must not overlap.
      max-parallel: 1
      matrix:
        include:
          - label: "2018.4"
            unity-version: 2018.4.36f1
            image: unityci/editor:ubuntu-2018.4.36f1-base-3.2.2
            artifact-key: "2018.4"
            package_mode: false
            project_path: tests/unity-2018-project
          - label: "2021.3"
            unity-version: 2021.3.45f1
            image: unityci/editor:ubuntu-2021.3.45f1-linux-il2cpp-3.2.2
            artifact-key: "2021.3"
            package_mode: true
            project_path: src/dcc_mcp_unity/unity_package
          - label: "6000.5"
            unity-version: 6000.5.4f1
            image: unityci/editor:ubuntu-6000.5.4f1-linux-il2cpp-3.2.2
            artifact-key: "6000.5"
            package_mode: true
            project_path: src/dcc_mcp_unity/unity_package
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v6
      - id: unity-tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          packageMode: ${{ matrix.package_mode }}
          projectPath: ${{ matrix.project_path }}
          unityVersion: ${{ matrix.unity-version }}
          customImage: ${{ matrix.image }}
          testMode: EditMode
          artifactsPath: artifacts/unity-${{ matrix.artifact-key }}-editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: Unity ${{ matrix.label }} / EditMode results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unity-${{ matrix.artifact-key }}-editmode-results
          path: ${{ steps.unity-tests.outputs.artifactsPath }}
          if-no-files-found: warn
          retention-days: 14

  minimum-core:
    name: Minimum dcc-mcp-core / Python 3.9
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - run: python -m pip install "dcc-mcp-core==0.19.45" -e ".[dev]"
      - run: python -m pytest

  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest

  lint-build:
    name: Lint, skill contracts, and package build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: ruff check src tests tools
      - run: ruff format --check src tests tools
      - run: python tools/lint_skills.py
      - run: python -m build
      - run: python -m twine check dist/*
